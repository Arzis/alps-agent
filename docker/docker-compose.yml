services:
  # ============================================================
  # PostgreSQL - 结构化数据 + LangGraph Checkpoint
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: qa-postgres
    environment:
      POSTGRES_DB: qa_assistant
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d qa_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qa-network

  # ============================================================
  # Redis Stack - 缓存 + 会话 + (Phase2: 语义缓存向量搜索)
  # ============================================================
  redis:
    image: redis/redis-stack:latest
    container_name: qa-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
      - ./configs/redis/redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qa-network

  # ============================================================
  # Milvus Standalone - 向量数据库
  # ============================================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: qa-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - qa-network

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: qa-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - qa-network

  milvus:
    image: milvusdb/milvus:v2.4.13-hotfix
    container_name: qa-milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    command: milvus run standalone
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    networks:
      - qa-network

  # ======= 添加 Attu 服务 =======
  attu:
    container_name: qa-milvus-attu
    image: zilliz/attu:latest
    ports:
      - "3000:3000"
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - qa-network


  # ============================================================
  # Elasticsearch - BM25 稀疏检索 (Phase 2)
  # ============================================================
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: qa-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - qa-network

  # ============================================================
  # LangFuse - LLM可观测性平台 (Phase 2)
  # ============================================================
  langfuse:
    image: langfuse/langfuse:2
    container_name: qa-langfuse
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/langfuse
      NEXTAUTH_SECRET: my-langfuse-secret-key-change-in-production
      NEXTAUTH_URL: http://localhost:3001
      SALT: my-salt-value-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - qa-network

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  es_data:

networks:
  qa-network:
    driver: bridge
